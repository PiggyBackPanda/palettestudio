workflows:
  ios-app:
    name: Palette Studio iOS
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      node: 18
      xcode: latest
      groups:
        - app_store_credentials  # Set up in Codemagic UI: APP_STORE_CONNECT_KEY_ID, etc.
      vars:
        BUNDLE_ID: com.palettestudio.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web assets
        script: npm run build

      - name: Set up Capacitor iOS project
        script: |
          npx cap add ios || true  # OK if already exists
          npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    integrations:
      app_store_connect: Codemagic  # Name of the API key integration set up in Codemagic UI

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false  # Set to true when ready for production
